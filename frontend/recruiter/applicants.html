<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Applicants — CampusRecruit</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-logo">Campus<span style="color:#60a5fa;">Recruit</span></div>
  <ul class="navbar-links">
    <li><a href="/recruiter/dashboard.html">Dashboard</a></li>
    <li><a href="/recruiter/post_job.html">Post a Job</a></li>
    <li><a href="/recruiter/my_jobs.html" class="active">My Job Postings</a></li>
  </ul>
  <div class="navbar-user">
    <span id="navbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <div style="margin-bottom:16px;">
    <a href="/recruiter/my_jobs.html"
       style="font-size:13px; color:#1a56db; font-weight:600;">
      ← Back to My Jobs
    </a>
  </div>

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
    <div>
      <div class="page-title" id="job-title-heading">Applicants</div>
      <div class="page-subtitle" id="job-subtitle">Ranked by AI match score</div>
    </div>
    <button class="btn btn-secondary" onclick="rerank()" id="rerank-btn">
      Recalculate Rankings
    </button>
  </div>

  <div id="alert-applicants" class="alert"></div>

  <div class="stats-grid" style="grid-template-columns: repeat(4,1fr); margin-bottom:20px;">
    <div class="stat-card">
      <div class="stat-label">Total Applicants</div>
      <div class="stat-value" id="count-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Submitted</div>
      <div class="stat-value" id="count-submitted" style="color:#64748b;">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Shortlisted</div>
      <div class="stat-value" id="count-shortlisted" style="color:#16a34a;">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Accepted</div>
      <div class="stat-value" id="count-accepted" style="color:#1a56db;">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Ranked Candidates</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Candidate</th>
            <th>CGPA</th>
            <th>Major</th>
            <th>Match Score</th>
            <th>Status</th>
            <th>Applied On</th>
            <th>Update Status</th>
          </tr>
        </thead>
        <tbody id="applicants-body">
          <tr>
            <td colspan="8" style="text-align:center; padding:32px; color:#64748b;">
              Loading applicants...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="/js/auth.js"></script>
<script src="/js/recruiter.js"></script>
<script>
  requireRecruiter();
  setNavbarName();
  loadApplicants();
</script>
</body>
</html>
