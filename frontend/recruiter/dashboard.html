<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recruiter Dashboard — CampusRecruit</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-logo">Campus<span style="color:#60a5fa;">Recruit</span></div>
  <ul class="navbar-links">
    <li><a href="/recruiter/dashboard.html" class="active">Dashboard</a></li>
    <li><a href="/recruiter/post_job.html">Post a Job</a></li>
    <li><a href="/recruiter/my_jobs.html">My Job Postings</a></li>
  </ul>
  <div class="navbar-user">
    <span id="navbar-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="page-title" id="greeting">Welcome back</div>
  <div class="page-subtitle">Here is your recruitment overview</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Jobs Posted</div>
      <div class="stat-value" id="stat-jobs">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Applications</div>
      <div class="stat-value" id="stat-total" style="color:#1a56db;">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Shortlisted</div>
      <div class="stat-value" id="stat-shortlisted" style="color:#16a34a;">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Accepted</div>
      <div class="stat-value" id="stat-accepted" style="color:#1e293b;">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">My Job Postings Overview</div>
    <div id="jobs-overview">
      <div class="empty-state">
        <p>No job postings yet.</p>
        <a href="/recruiter/post_job.html" class="btn btn-primary btn-sm">Post Your First Job</a>
      </div>
    </div>
  </div>

</div>

<script src="/js/auth.js"></script>
<script src="/js/recruiter.js"></script>
<script>
  requireRecruiter();
  setNavbarName();
  document.getElementById('greeting').textContent = 'Welcome back, ' + getName();
  loadRecruiterDashboard();
</script>
</body>
</html>
