<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <title>Register | CampusRecruit</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">CampusRecruit</div>
            <div class="auth-tagline">Create your account</div>
            <div id="alert" class="alert"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Your full name" required />
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password" required />
                </div>
                <div class="form-group">
                    <label for="role">I am registering as</label>
                    <select id="role" required>
                        <option value="">Select your role</option>
                        <option value="student">Student</option>
                        <option value="recruiter">Recruiter</option>
                    </select>
                </div>

                <!-- Student Fields -->
                <div id="student-fields" style="display:none;">
                    <div class="form-group">
                        <label for="cgpa">CGPA (out of 4.0)</label>
                        <input type="number" id="cgpa" step="0.01" min="0" max="4.0" placeholder="e.g. 3.5" />
                    </div>
                    <div class="form-group">
                        <label for="major">Major / Field of Study</label>
                        <input type="text" id="major" placeholder="e.g. Computer Science" />
                    </div>
                    <div class="form-group">
                        <label for="grad-year">Graduation Year</label>
                        <input type="number" id="grad-year" placeholder="e.g. 2025" />
                    </div>
                </div>

                <!-- Recruiter Fields -->
                <div id="recruiter-fields" style="display:none;">

                    <!-- Toggle: select existing or create new company -->
                    <div class="form-group">
                        <label>Company</label>
                        <div style="display:flex; gap:32px; padding:12px;
                                    background:#f8fafc; border-radius:8px;
                                    border:1px solid #e2e8f0; margin-bottom:12px; white-space:nowrap;">
                            <label style="display:flex; align-items:center; gap:6px;
                                          cursor:pointer; font-weight:normal; font-size:13px;">
                                <input type="radio" name="company-mode" value="select" checked
                                    onchange="toggleCompanyMode('select')" />
                                Select existing
                            </label>
                            <label style="display:flex; align-items:center; gap:6px;
                                          cursor:pointer; font-weight:normal; font-size:13px;">
                                <input type="radio" name="company-mode" value="create"
                                    onchange="toggleCompanyMode('create')" />
                                Create new company
                            </label>
                        </div>
                    </div>

                    <!-- Select Existing Company -->
                    <div id="select-company-fields">
                        <div class="form-group">
                            <label for="company-select">Select Your Company</label>
                            <select id="company-select">
                                <option value="">Loading companies...</option>
                            </select>
                        </div>
                    </div>

                    <!-- Create New Company -->
                    <div id="create-company-fields" style="display:none;">
                        <div class="form-group">
                            <label for="new-company-name">Company Name</label>
                            <input type="text" id="new-company-name" placeholder="e.g. TechCorp Solutions" />
                        </div>
                        <div class="form-group">
                            <label for="new-company-industry">Industry</label>
                            <input type="text" id="new-company-industry" placeholder="e.g. Technology" />
                        </div>
                        <div class="form-group">
                            <label for="new-company-location">Location</label>
                            <input type="text" id="new-company-location" placeholder="e.g. Karachi" />
                        </div>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
                    Create Account
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/index.html">Sign in here</a>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>

</html>
