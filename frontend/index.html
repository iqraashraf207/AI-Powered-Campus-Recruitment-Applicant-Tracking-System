<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Campus Recruitment</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">CampusRecruit</div>
    <div class="auth-tagline">AI-Powered Campus Recruitment Portal</div>

    <h2 class="auth-title">Sign in to your account</h2>

    <div id="alert" class="alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Create one here</a>
    </div>

  </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
